name: debug-probe

# 临时调试用:探测东财各节点/请求头组合在GitHub服务器上的连通性,验证完即删除

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Probe eastmoney endpoints
        run: |
          pip install -q requests
          python - <<'EOF'
          import requests, time

          UA = {"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36"}
          REF = {"Referer": "https://quote.eastmoney.com/"}

          targets = {
              "ETF控制组": "b:MK0021,b:MK0022,b:MK0023,b:MK0024",
              "行业板块": "m:90 t:2 f:!50",
              "概念板块": "m:90 t:3 f:!50",
              "全A股票": "m:0 t:6,m:0 t:80,m:1 t:2,m:1 t:23,m:0 t:81 s:2048",
          }
          hosts = [
              "https://88.push2.eastmoney.com",
              "https://push2.eastmoney.com",
              "https://push2delay.eastmoney.com",
              "http://17.push2.eastmoney.com",
          ]
          header_sets = {"无头": {}, "UA": UA, "UA+Ref": {**UA, **REF}}

          for tname, fs in targets.items():
              for host in hosts:
                  for hname, hdrs in header_sets.items():
                      params = {
                          "pn": "1", "pz": "10", "po": "1", "np": "1",
                          "ut": "bd1d9ddb04089700cf9c27f6f7426281",
                          "fltt": "2", "invt": "2", "fid": "f3", "fs": fs,
                          "fields": "f2,f3,f12,f14",
                      }
                      try:
                          r = requests.get(host + "/api/qt/clist/get", params=params, headers=hdrs, timeout=15)
                          d = r.json()
                          n = d.get("data") and len(d["data"].get("diff") or []) or 0
                          total = d.get("data") and d["data"].get("total") or 0
                          print(f"{tname:6s} | {host:38s} | {hname:6s} | HTTP{r.status_code} 行数{n} 总数{total}")
                      except Exception as e:
                          print(f"{tname:6s} | {host:38s} | {hname:6s} | FAIL {type(e).__name__}: {str(e)[:60]}")
                      time.sleep(0.8)
          EOF
